  const { useState } = React;

  function Navbar() {
    const [isOpen, setIsOpen] = useState(false);

    const toggleNavbar = () => setIsOpen(!isOpen);
    const closeNavbar = () => setIsOpen(false);

    const navLinks = [
      { name: 'Home', href: '#root' },
      { name: 'About', href: '#about-root' },
      { name: 'Skills', href: '#skills-root' },
      { name: 'Contact', href: '#contact' },
    ];

    return (
      <div>
        {/* Hamburger / X button */}
        <button 
          onClick={toggleNavbar} 
          style={{
            position: 'absolute',
            top: '20px',
            right: '20px',
            zIndex: 1000,
            backgroundColor: '#1f4068',
            color: 'white',
            padding: '10px 15px',
            border: 'none',
            fontSize: '24px',
            borderRadius: '5px',
            cursor: 'pointer',
          }}
        >
          {isOpen ? '×' : '☰'}
        </button>

        {/* Full-screen dropdown menu */}
        {isOpen && (
          <div 
            style={{
              position: 'fixed',
              top: 0,
              left: 0,
              width: '100vw',
              height: '100vh',
              backgroundColor: 'rgba(255, 255, 255, 0.95)',
              zIndex: 999,
              display: 'flex',
              flexDirection: 'column',
              justifyContent: 'center',
              alignItems: 'center',
              textAlign: 'center',
              color: 'black',
            }}
          >
            {/* Navbar Links */}
            {navLinks.map((link, index) => (
              <a 
                key={index}
                href={link.href}
                onClick={closeNavbar}
                style={{
                  margin: '20px 0',
                  fontSize: '28px',
                  color: '#1f4068',
                  textDecoration: 'none',
                  cursor: 'pointer',
                }}
              >
                {link.name}
              </a>
            ))}
          </div>
        )}
      </div>
    );
  }

  ReactDOM.render(<Navbar />, document.getElementById('nav-root'));
</script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
      const particlesContainer = document.getElementById('particles-js');
      let particles = [];
      let particleCount;
      let lastTime = 0;
      let animationFrameId = null;
      let resizeTimeout;
  
      function initParticles() {
          particlesContainer.innerHTML = '';
          particles = [];
          const screenArea = window.innerWidth * window.innerHeight;
          particleCount = Math.min(Math.floor(screenArea / 5000), 150);
          
          for (let i = 0; i < particleCount; i++) {
              createParticle();
          }
          
          if (!animationFrameId) {
              animateParticles();
          }
      }
      
      function createParticle() {
          const particle = document.createElement('div');
          particle.className = 'particle';
          const size = Math.random() * 4 + 1;
          const posX = Math.random() * window.innerWidth;
          const posY = Math.random() * window.innerHeight;
          const opacity = Math.random() * 0.6 + 0.2;
          const speed = Math.random() * 0.5 + 0.2;
          
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;
          particle.style.backgroundColor = `rgba(255, 255, 255, ${opacity})`;
          particle.style.left = `${posX}px`;
          particle.style.top = `${posY}px`;
          particle.speed = speed;
          particle.x = posX;
          particle.y = posY;
          
          particlesContainer.appendChild(particle);
          particles.push(particle);
      }
      
      function animateParticles(currentTime = 0) {
          const deltaTime = currentTime - lastTime;
          lastTime = currentTime;
          const timeFactor = deltaTime / (1000/60);
          
          particles.forEach(particle => {
              particle.y -= particle.speed * timeFactor;
              
              if (particle.y < -10) {
                  resetParticle(particle);
              } else {
                  particle.style.top = `${particle.y}px`;
              }
          });
          
          animationFrameId = requestAnimationFrame(animateParticles);
      }
      
      function resetParticle(particle) {
          particle.x = Math.random() * window.innerWidth;
          particle.y = window.innerHeight + 10;
          particle.speed = Math.random() * 0.5 + 0.2;
          particle.style.left = `${particle.x}px`;
          particle.style.top = `${particle.y}px`;
      }
      
      window.addEventListener('resize', function() {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(function() {
              particles.forEach(particle => {
                  if (particle.x > window.innerWidth || particle.y > window.innerHeight) {
                      resetParticle(particle);
                  }
              });
              
              const newParticleCount = Math.min(Math.floor((window.innerWidth * window.innerHeight) / 5000), 150);
              if (Math.abs(newParticleCount - particleCount) > 20) {
                  initParticles();
              }
          }, 200);
      });
      
      initParticles();
      
      window.addEventListener('beforeunload', function() {
          if (animationFrameId) {
              cancelAnimationFrame(animationFrameId);
          }
      });
  });
  </script>
